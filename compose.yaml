services:
  claude-config-manager:
    build: .
    container_name: claude-config-manager
    # แอปไม่มี auth — bind เฉพาะ 127.0.0.1 อย่าเปิดออก network
    ports:
      - "127.0.0.1:8888:8888"
    environment:
      - CLAUDE_HOME=/data/host-home/.claude
      # ~/.claude.json (user-scope MCP servers) เป็นไฟล์ sibling ของ ~/.claude
      - CLAUDE_JSON=/data/host-home/.claude.json
    volumes:
      # mount ทั้ง $HOME แทนการ bind-mount ไฟล์เดี่ยว — Docker Desktop for Mac
      # จะ mount ไฟล์เดี่ยวค้าง (stale inode) เมื่อ host เขียนทับแบบ atomic
      # rename (Claude Code ทำแบบนี้กับ ~/.claude.json) ต้อง mount เป็นโฟลเดอร์
      # เท่านั้นถึงจะตามการ rename ทัน
      - ${HOME}:/data/host-home
    restart: unless-stopped
